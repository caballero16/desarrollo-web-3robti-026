<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <script src="AgeCalculator.js"></script>
</head>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    text-align:center;
}
h1{
    font-size:40px;
}
label{
    display:block;
    margin-bottom:8px;
    font-size:18px;
}
input{
    width:300px;
    padding:10px;
    font-size:18px;
    border-radius:8px;
    border:2px solid black;
}
button{
    margin-top:15px;
    width:320px;
    padding:12px;
    font-size:18px;
    background:#666;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    background:#444;
}
#resultado{
    margin-top:20px;
    font-size:22px;
}
</style>
<body>
   <div class="container">
    <h1>Age Calculator</h1>
    <label for="fecha">Enter your birth date:</label>
    <input type="date" id="fecha">
    <br>
    <button onclick="calcularEdad()">Calculate</button>
    <p id="resultado"></p>
</div>
</body>
</html>
